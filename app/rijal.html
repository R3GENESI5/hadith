<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Al-Itqan — Rijal (Narrator Profiles)</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Amiri:wght@400;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', system-ui, sans-serif; background: #0a0a0f; color: #e0d8c8; min-height: 100vh; }

        /* Nav */
        .top-nav { display: flex; gap: 10px; padding: 14px 20px; background: rgba(18,14,10,.92); border-bottom: 1px solid #2a2420; font-size: .82rem; flex-wrap: wrap; align-items: center; }
        .top-nav a { color: #8a8070; padding: 2px 10px; border: 1px solid #333; border-radius: 4px; text-decoration: none; }
        .top-nav a:hover { color: #d4a855; border-color: #d4a855; }

        /* Header */
        .header { text-align: center; padding: 20px 20px 10px; }
        .header h1 { font-family: 'Amiri', serif; font-size: 1.5rem; color: #d4a855; }
        .header .sub { font-size: .8rem; color: #8a8070; margin-top: 4px; }

        /* Search */
        .search-bar { max-width: 700px; margin: 16px auto 8px; padding: 0 20px; }
        .search-bar input { width: 100%; padding: 10px 14px; background: #1a1612; border: 1px solid #333; border-radius: 8px; color: #e0d8c8; font-size: 1rem; }
        .search-bar input:focus { border-color: #d4a855; outline: none; }

        /* Filters */
        .filters { max-width: 700px; margin: 0 auto 12px; padding: 0 20px; display: flex; gap: 8px; flex-wrap: wrap; }
        .filters select { background: #1a1612; border: 1px solid #333; color: #ccc; padding: 6px 10px; border-radius: 6px; font-size: .82rem; }

        /* Stats */
        .stats-bar { text-align: center; font-size: .78rem; color: #666; margin-bottom: 12px; }

        /* Grid */
        .grid { max-width: 900px; margin: 0 auto; padding: 0 20px 40px; }
        .card { background: #1a1612; border: 1px solid #2a2420; border-radius: 8px; padding: 14px 16px; margin-bottom: 10px; cursor: pointer; transition: border-color .15s; }
        .card:hover { border-color: #d4a855; }
        .card-header { display: flex; justify-content: space-between; align-items: flex-start; gap: 10px; }
        .card-name { font-family: 'Amiri', serif; font-size: 1.2rem; color: #e0d8c8; direction: rtl; }
        .card-kunya { font-size: .82rem; color: #8a8070; direction: rtl; }
        .card-grade { font-size: .72rem; padding: 2px 8px; border-radius: 10px; white-space: nowrap; }
        .card-meta { font-size: .78rem; color: #777; margin-top: 6px; }
        .card-meta span { margin-right: 12px; }

        /* Expanded detail */
        .card-detail { display: none; margin-top: 12px; padding-top: 12px; border-top: 1px solid #222; }
        .card.expanded .card-detail { display: block; }
        .detail-section { margin-bottom: 10px; }
        .detail-label { font-size: .72rem; color: #d4a855; text-transform: uppercase; letter-spacing: .08em; margin-bottom: 4px; }
        .detail-text { font-size: .85rem; color: #b0a898; line-height: 1.6; }
        .detail-text-ar { font-family: 'Amiri', serif; font-size: 1rem; color: #e0d8c8; direction: rtl; line-height: 1.8; }
        .jarh-scholar { color: #d4a855; font-weight: 600; font-size: .82rem; }
        .jarh-opinion { font-size: .82rem; color: #a09888; direction: rtl; line-height: 1.7; margin-bottom: 6px; font-family: 'Amiri', serif; }
        .name-variants { display: flex; flex-wrap: wrap; gap: 4px; direction: rtl; }
        .name-var { font-size: .72rem; color: #8a8070; background: #1e1a16; border: 1px solid #2a2420; border-radius: 10px; padding: 1px 8px; font-family: 'Amiri', serif; }

        /* No results */
        .no-results { text-align: center; color: #555; padding: 40px; }

        /* Dashboard */
        .dashboard { max-width: 900px; margin: 0 auto 16px; padding: 0 20px; }
        .dash-section { margin-bottom: 16px; }
        .dash-title { font-size: .78rem; color: #d4a855; text-transform: uppercase; letter-spacing: .1em; margin-bottom: 8px; }
        .grade-bars { display: flex; gap: 6px; flex-wrap: wrap; }
        .grade-bar {
            flex: 1; min-width: 80px; padding: 10px 8px; border-radius: 6px; text-align: center;
            cursor: pointer; transition: all .15s; border: 1px solid transparent;
        }
        .grade-bar:hover { border-color: #d4a855; transform: translateY(-2px); }
        .grade-bar.active { border-color: #d4a855; box-shadow: 0 0 8px rgba(212,168,85,.3); }
        .gb-count { font-size: 1.2rem; font-weight: 700; }
        .gb-label { font-size: .65rem; text-transform: uppercase; letter-spacing: .05em; margin-top: 2px; }
        .gb-pct { font-size: .6rem; opacity: .7; }

        .tabaqat-grid { display: flex; gap: 4px; flex-wrap: wrap; }
        .tab-chip {
            font-size: .72rem; padding: 4px 10px; border-radius: 12px; cursor: pointer;
            border: 1px solid #333; color: #8a8070; transition: all .15s;
        }
        .tab-chip:hover { border-color: #d4a855; color: #d4a855; }
        .tab-chip.active { background: #d4a855; color: #0a0a0f; border-color: #d4a855; }
        .tab-chip .chip-count { font-weight: 600; color: #d4a855; margin-left: 4px; }
        .tab-chip.active .chip-count { color: #0a0a0f; }

        .city-chips { display: flex; gap: 4px; flex-wrap: wrap; }
        .city-chip {
            font-size: .7rem; padding: 3px 8px; border-radius: 10px; cursor: pointer;
            border: 1px solid #2a2420; color: #777; transition: all .15s;
        }
        .city-chip:hover { border-color: #d4a855; color: #d4a855; }
        .city-chip.active { background: #1a1612; border-color: #d4a855; color: #d4a855; }
    </style>
</head>
<body>

<div class="top-nav">
    <a href="../index.html" title="Home">&#x1F3E0;</a>
    <a href="../quran/index.html">Quran</a>
    <a href="index.html">Hadith</a>
    <a href="families.html">Families</a>
    <a href="isnad.html">Isnad</a>
    <a href="chord.html">Chords</a>
</div>

<div class="header">
    <h1>علم الرجال — Narrator Profiles</h1>
    <div class="sub">115,735 narrators from 22 classical texts · 127k teacher-student links · Grades by Ibn Hajar, al-Dhahabi, Ibn Hibban, Ibn Abi Hatim · Jarh wa Ta'dil</div>
</div>

<div class="dashboard">
    <div class="dash-section">
        <div class="dash-title">Narrator Grades</div>
        <div class="grade-bars" id="grade-bars"></div>
    </div>
    <div class="dash-section">
        <div class="dash-title">Generations (Tabaqat)</div>
        <div class="tabaqat-grid" id="tabaqat-chips"></div>
    </div>
    <div class="dash-section">
        <div class="dash-title">Top Cities</div>
        <div class="city-chips" id="city-chips"></div>
    </div>
</div>

<div class="search-bar">
    <input id="search" type="search" placeholder="Search by name, kunya, or city… (Arabic or English)" autocomplete="off" spellcheck="false">
</div>
<div class="filters" style="display:none">
    <select id="grade-filter">
        <option value="">All grades</option>
        <option value="companion">Companion (صحابي)</option>
        <option value="reliable">Reliable (ثقة)</option>
        <option value="mostly_reliable">Mostly reliable (صدوق)</option>
        <option value="weak">Weak (ضعيف)</option>
        <option value="abandoned">Abandoned (متروك)</option>
        <option value="unknown">Unknown</option>
    </select>
    <select id="tabaqat-filter">
        <option value="">All generations</option>
    </select>
</div>
<div class="stats-bar" id="stats"></div>
<div class="grid" id="grid"></div>
<div class="no-results" id="no-results" style="display:none">No matching narrators.</div>

<script>
const GRADE_COLORS = {
    companion: '#9b59b6', reliable: '#2ecc71', mostly_reliable: '#f39c12',
    weak: '#e74c3c', abandoned: '#c0392b', fabricator: '#8b0000', unknown: '#95a5a6'
};
const GRADE_LABELS = {
    companion: 'Companion', reliable: 'Reliable', mostly_reliable: 'Mostly reliable',
    weak: 'Weak', abandoned: 'Abandoned', fabricator: 'Fabricator', unknown: 'Unknown'
};

let allProfiles = [];
let displayed = 0;
const PAGE_SIZE = 50;
let activeGrade = '';
let activeTabaqa = '';
let activeCity = '';

// Clean tabaqat: map long narrative descriptions to the core generation
const TABAQAT_CLEAN = {
    'الأولى': 1, 'الثانية': 2, 'الثالثة': 3, 'الرابعة': 4, 'الخامسة': 5,
    'السادسة': 6, 'السابعة': 7, 'الثامنة': 8, 'التاسعة': 9, 'العاشرة': 10,
    'الحادية عشرة': 11, 'الثانية عشرة': 12
};

function cleanTabaqa(t) {
    if (!t) return '';
    for (const [key, num] of Object.entries(TABAQAT_CLEAN)) {
        if (t.startsWith(key)) return key;
    }
    if (t.includes('صحابي') || t.includes('صحابية') || t.includes('الصحابة')) return 'صحابي';
    if (t.includes('مخضرم')) return 'مخضرم';
    return '';
}

async function init() {
    // Load split rijal data (per-grade profile chunks)
    const manifest = await fetch('data/rijal/manifest.json').then(r => r.json());
    const profileFiles = manifest.files.filter(f => f.type === 'profiles');

    // Load all profile chunks in parallel
    const chunks = await Promise.all(
        profileFiles.map(f => fetch(`data/rijal/${f.name}`).then(r => r.json()))
    );

    // Merge into single profiles object
    const profiles = {};
    chunks.forEach(chunk => Object.assign(profiles, chunk));

    allProfiles = Object.values(profiles).sort((a, b) => {
        const order = { companion: 0, reliable: 1, mostly_reliable: 2, weak: 3, abandoned: 4, fabricator: 5, unknown: 6 };
        return (order[a.grade_en] || 6) - (order[b.grade_en] || 6) || a.full_name.localeCompare(b.full_name, 'ar');
    });

    buildDashboard();

    document.getElementById('search').addEventListener('input', () => { displayed = 0; render(); });

    window.addEventListener('scroll', () => {
        if (window.innerHeight + window.scrollY >= document.body.offsetHeight - 200) loadMore();
    });

    render();
}

function buildDashboard() {
    // Grade bars
    const gradeCounts = {};
    const GRADE_ORDER = ['companion', 'reliable', 'mostly_reliable', 'weak', 'abandoned', 'fabricator', 'unknown'];
    GRADE_ORDER.forEach(g => gradeCounts[g] = 0);
    allProfiles.forEach(p => { gradeCounts[p.grade_en || 'unknown']++; });

    const barsEl = document.getElementById('grade-bars');
    barsEl.innerHTML = '';
    const total = allProfiles.length;
    GRADE_ORDER.forEach(g => {
        const count = gradeCounts[g] || 0;
        if (count === 0) return;
        const color = GRADE_COLORS[g];
        const bar = document.createElement('div');
        bar.className = 'grade-bar';
        bar.style.background = color + '18';
        bar.innerHTML = `<div class="gb-count" style="color:${color}">${count.toLocaleString()}</div>
            <div class="gb-label" style="color:${color}">${GRADE_LABELS[g]}</div>
            <div class="gb-pct" style="color:${color}">${(count*100/total).toFixed(1)}%</div>`;
        bar.addEventListener('click', () => {
            activeGrade = activeGrade === g ? '' : g;
            document.querySelectorAll('.grade-bar').forEach(b => b.classList.remove('active'));
            if (activeGrade) bar.classList.add('active');
            displayed = 0; render();
        });
        barsEl.appendChild(bar);
    });

    // Tabaqat chips — only the 12 main generations + Sahabi + Mukhadram
    const tabCounts = {};
    allProfiles.forEach(p => {
        const t = cleanTabaqa(p.tabaqat);
        if (t) tabCounts[t] = (tabCounts[t] || 0) + 1;
    });
    const TAB_ORDER = ['صحابي', 'مخضرم', 'الثانية', 'الثالثة', 'الرابعة', 'الخامسة',
        'السادسة', 'السابعة', 'الثامنة', 'التاسعة', 'العاشرة', 'الحادية عشرة', 'الثانية عشرة'];
    const tabEl = document.getElementById('tabaqat-chips');
    tabEl.innerHTML = '';
    TAB_ORDER.forEach(t => {
        const count = tabCounts[t];
        if (!count) return;
        const chip = document.createElement('span');
        chip.className = 'tab-chip';
        chip.innerHTML = `${t} <span class="chip-count">${count.toLocaleString()}</span>`;
        chip.addEventListener('click', () => {
            activeTabaqa = activeTabaqa === t ? '' : t;
            document.querySelectorAll('.tab-chip').forEach(c => c.classList.remove('active'));
            if (activeTabaqa) chip.classList.add('active');
            displayed = 0; render();
        });
        tabEl.appendChild(chip);
    });

    // City chips — top 15
    const cityCounts = {};
    allProfiles.forEach(p => { if (p.city) cityCounts[p.city] = (cityCounts[p.city] || 0) + 1; });
    const topCities = Object.entries(cityCounts).sort((a,b) => b[1]-a[1]).slice(0, 15);
    const cityEl = document.getElementById('city-chips');
    cityEl.innerHTML = '';
    topCities.forEach(([city, count]) => {
        const chip = document.createElement('span');
        chip.className = 'city-chip';
        chip.textContent = `${city} (${count})`;
        chip.addEventListener('click', () => {
            activeCity = activeCity === city ? '' : city;
            document.querySelectorAll('.city-chip').forEach(c => c.classList.remove('active'));
            if (activeCity) chip.classList.add('active');
            displayed = 0; render();
        });
        cityEl.appendChild(chip);
    });
}

function getFiltered() {
    const q = document.getElementById('search').value.trim().toLowerCase();

    return allProfiles.filter(p => {
        if (activeGrade && p.grade_en !== activeGrade) return false;
        if (activeTabaqa) {
            const ct = cleanTabaqa(p.tabaqat);
            if (ct !== activeTabaqa) return false;
        }
        if (activeCity && p.city !== activeCity) return false;
        if (q) {
            const haystack = (p.full_name + ' ' + p.kunya + ' ' + (p.namings || []).join(' ') + ' ' + p.city + ' ' + p.laqab + ' ' + p.nasab).toLowerCase();
            return haystack.includes(q);
        }
        return true;
    });
}

function render() {
    const filtered = getFiltered();
    const grid = document.getElementById('grid');
    grid.innerHTML = '';
    displayed = 0;

    document.getElementById('stats').textContent =
        `${filtered.length.toLocaleString()} narrators`;

    document.getElementById('no-results').style.display = filtered.length ? 'none' : 'block';
    loadMore(filtered);
}

function loadMore(filteredOverride) {
    const filtered = filteredOverride || getFiltered();
    const grid = document.getElementById('grid');
    const batch = filtered.slice(displayed, displayed + PAGE_SIZE);

    batch.forEach(p => {
        const color = GRADE_COLORS[p.grade_en] || '#95a5a6';
        const label = GRADE_LABELS[p.grade_en] || 'Unknown';
        const card = document.createElement('div');
        card.className = 'card';
        card.innerHTML = `
            <div class="card-header">
                <div>
                    <div class="card-name">${esc(p.full_name)}</div>
                    ${p.kunya ? `<div class="card-kunya">${esc(p.kunya)}</div>` : ''}
                </div>
                <span class="card-grade" style="background:${color}22;color:${color};border:1px solid ${color}55">${label}</span>
            </div>
            <div class="card-meta">
                ${p.grade_ar ? `<span style="direction:rtl;font-family:'Amiri',serif">${esc(p.grade_ar)}</span>` : ''}
                ${p.death ? `<span>d. ${esc(p.death)}</span>` : ''}
                ${p.city ? `<span>${esc(p.city)}</span>` : ''}
                ${p.tabaqat ? `<span>${esc(p.tabaqat)}</span>` : ''}
            </div>
            <div class="card-detail">
                ${p.dhahabi ? `<div class="detail-section"><div class="detail-label">Al-Dhahabi</div><div class="detail-text-ar">${esc(p.dhahabi)}</div></div>` : ''}
                ${p.laqab ? `<div class="detail-section"><div class="detail-label">Laqab</div><div class="detail-text">${esc(p.laqab)}</div></div>` : ''}
                ${p.nasab ? `<div class="detail-section"><div class="detail-label">Nasab / Nisba</div><div class="detail-text">${esc(p.nasab)}</div></div>` : ''}
                ${p.namings && p.namings.length > 1 ? `<div class="detail-section"><div class="detail-label">Name variants (${p.namings.length})</div><div class="name-variants">${p.namings.map(n => `<span class="name-var">${esc(n)}</span>`).join('')}</div></div>` : ''}
                ${p.jarh_wa_tadil ? renderJarh(p.jarh_wa_tadil) : ''}
            </div>
        `;
        card.addEventListener('click', () => card.classList.toggle('expanded'));
        grid.appendChild(card);
    });

    displayed += batch.length;
}

function renderJarh(jarh) {
    const entries = Object.entries(jarh);
    if (!entries.length) return '';
    let html = '<div class="detail-section"><div class="detail-label">Jarh wa Ta\'dil (Scholar opinions)</div>';
    entries.forEach(([scholar, opinion]) => {
        html += `<div class="jarh-scholar">${esc(scholar)}</div>`;
        html += `<div class="jarh-opinion">${esc(opinion)}</div>`;
    });
    return html + '</div>';
}

function esc(s) { return (s || '').replace(/</g, '&lt;').replace(/>/g, '&gt;'); }

init();
</script>
</body>
</html>
