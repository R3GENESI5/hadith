server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Serve large JSON data files with correct headers
    location /data/ {
        add_header Cache-Control "public, max-age=86400";
        add_header Access-Control-Allow-Origin "*";
        try_files $uri =404;
    }

    # SPA fallback
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Proxy semantic search to search container
    location /api/search/ {
        proxy_pass http://search:7860/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # Proxy RAG Q&A to rag container
    location /api/rag/ {
        proxy_pass http://rag:7861/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
}
