version: "3.9"

# Al-Itqan — Self-hosted stack
# ─────────────────────────────
# Services:
#   app      — static web app (nginx, port 8080)
#   search   — semantic search API (Gradio, port 7860)
#   rag      — hadith Q&A (Gradio, port 7861)
#
# Usage:
#   docker compose up -d
#   Open http://YOUR_NAS_IP:8080

services:

  # ── Static web app ──────────────────────────────────────────────────────────
  app:
    image: nginx:alpine
    container_name: al-itqan-app
    ports:
      - "8080:80"
    volumes:
      - ./app:/usr/share/nginx/html:ro
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    restart: unless-stopped

  # ── Semantic search ─────────────────────────────────────────────────────────
  search:
    build:
      context: .
      dockerfile: Dockerfile.ai
    container_name: al-itqan-search
    ports:
      - "7860:7860"
    volumes:
      - ./hf_spaces/search/app.py:/app/app.py:ro
      - ./app/data/semantic:/data/semantic:ro
      - ai_model_cache:/root/.cache/huggingface
    environment:
      - GRADIO_SERVER_PORT=7860
      - GRADIO_SERVER_NAME=0.0.0.0
      - INDEX_PATH=/data/semantic/semantic_index.faiss
      - META_PATH=/data/semantic/semantic_meta.json
      - USE_LOCAL_INDEX=1          # skip HF Hub download, use mounted files
    restart: unless-stopped
    command: python /app/app.py

  # ── RAG Q&A ─────────────────────────────────────────────────────────────────
  rag:
    build:
      context: .
      dockerfile: Dockerfile.ai
    container_name: al-itqan-rag
    ports:
      - "7861:7861"
    volumes:
      - ./hf_spaces/rag/app.py:/app/app.py:ro
      - ./app/data/semantic:/data/semantic:ro
      - ai_model_cache:/root/.cache/huggingface
    environment:
      - GRADIO_SERVER_PORT=7861
      - GRADIO_SERVER_NAME=0.0.0.0
      - INDEX_PATH=/data/semantic/semantic_index.faiss
      - META_PATH=/data/semantic/semantic_meta.json
      - USE_LOCAL_INDEX=1
    restart: unless-stopped
    command: python /app/app.py

volumes:
  ai_model_cache:   # shared model cache — downloads once, reused by both containers
