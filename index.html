<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Itqan — Quran &amp; Hadith Study Platform</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            background: #0a0a0f;
            color: #e0d8c8;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .container {
            text-align: center;
            max-width: 700px;
            padding: 2rem;
        }
        .title-ar {
            font-family: 'Amiri', serif;
            font-size: 3.5rem;
            color: #d4a855;
            margin-bottom: 0.25rem;
            direction: rtl;
        }
        .title-en {
            font-size: 1.1rem;
            color: #8a8070;
            letter-spacing: 0.3em;
            text-transform: uppercase;
            margin-bottom: 2rem;
        }
        .desc {
            font-size: 1.05rem;
            line-height: 1.7;
            color: #b0a898;
            margin-bottom: 2.5rem;
        }
        .stats {
            display: flex;
            justify-content: center;
            gap: 2.5rem;
            margin-bottom: 2.5rem;
            flex-wrap: wrap;
        }
        .stat-n { display: block; font-size: 1.6rem; color: #d4a855; font-weight: 700; }
        .stat-l { font-size: 0.8rem; color: #8a8070; text-transform: uppercase; letter-spacing: 0.1em; }
        .links {
            display: flex;
            justify-content: center;
            gap: 1rem;
            flex-wrap: wrap;
        }
        a.btn {
            display: inline-block;
            padding: 0.75rem 1.8rem;
            border: 1px solid #d4a855;
            color: #d4a855;
            text-decoration: none;
            border-radius: 4px;
            font-size: 1rem;
            transition: all 0.2s;
        }
        a.btn:hover {
            background: #d4a855;
            color: #0a0a0f;
        }
        a.btn.secondary {
            border-color: #555;
            color: #999;
        }
        a.btn.secondary:hover {
            background: #555;
            color: #e0d8c8;
        }
    </style>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Amiri:wght@400;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="container">
        <div class="title-ar">الإتقان</div>
        <div class="title-en">Itqan</div>
        <p class="desc">
            A unified Quran and Hadith study platform.<br>
            Every connection grounded in classical Arabic root morphology.
        </p>
        <div class="stats">
            <div><span class="stat-n">87k+</span><span class="stat-l">Hadiths</span></div>
            <div><span class="stat-n">6,236</span><span class="stat-l">Ayahs</span></div>
            <div><span class="stat-n">1,201</span><span class="stat-l">Shared Roots</span></div>
            <div><span class="stat-n">17</span><span class="stat-l">Books</span></div>
        </div>
        <div class="links">
            <a href="quran/index.html" class="btn">Quran bil-Quran</a>
            <a href="app/index.html" class="btn">Hadith Library</a>
            <a href="app/isnad.html" class="btn secondary">Isnad Visualizer</a>
            <a href="app/chord.html" class="btn secondary">Chord Graphs</a>
        </div>
        <div style="margin-top: 1.5rem;">
            <a href="https://doi.org/10.5281/zenodo.19453613"><img src="https://zenodo.org/badge/DOI/10.5281/zenodo.19453613.svg" alt="DOI"></a>
        </div>
    </div>
</body>
</html>
